bind = SUPER ALT CTRL SHIFT, escape, exec, uwsm stop
bind = SUPER ALT SHIFT, l, exec, uwsm app -- myarchy-session lock

bind = SUPER, space, exec, uwsm app -- rofi -show combi -display-combi "▶" -modes combi -combi-modes "window,drun" -show-icons 
bind = SUPER SHIFT, space, exec, uwsm app -- myarchy-menu
bind = SUPER, q, exec, uwsm app -- alacritty
bind = SUPER SHIFT, e, exec, uwsm app -- rofi -modi emoji -show emoji -display-emoji "Emoji"
bind = SUPER SHIFT, s, exec, uwsm app -- myarchy-screenshot
bind = SUPER, i, exec, uwsm app -- myarchy-hypr-window-info-menu

bind = SUPER, c, killactive,
bind = SUPER, v, togglefloating,
bind = SUPER, o, pseudo
bind = SUPER, s, togglesplit,
bind = SUPER, f, fullscreen,
# bind = SUPER, g, togglegroup,

# Move focus
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

# Move window or group
bind = SUPER SHIFT, h, movewindoworgroup, l
bind = SUPER SHIFT, l, movewindoworgroup, r
bind = SUPER SHIFT, k, movewindoworgroup, u
bind = SUPER SHIFT, j, movewindoworgroup, d

# Move/resize windows with mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Resize windows with keyboard
bind= SUPER,r,submap,resize 
submap=resize
binde=,l,resizeactive,100 0
binde=,h,resizeactive,-100 0
binde=,k,resizeactive,0 -100
binde=,j,resizeactive,0 100
bind =,catchall, submap, reset
submap=reset

# Cycle groups
bind = ALT, tab, changegroupactive, f
bind = ALT SHIFT, tab, changegroupactive, b

# Cycle windows
bindd = SUPER, tab, Cycle to next window, cyclenext
bindd = SUPER, tab, Reveal active window on top, bringactivetotop
bindd = SUPER SHIFT, tab, Cycle to previous window, cyclenext, prev
bindd = SUPER SHIFT, tab, Reveal active window on top, bringactivetotop

# Cycle workspaces
bindd = SUPER, mouse_down, Scroll active workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll active workspace backward, workspace, e-1

# Switch workspaces
bind = SUPER, ampersand, workspace, 1
bind = SUPER, eacute, workspace, 2
bind = SUPER, quotedbl, workspace, 3
bind = SUPER, apostrophe, workspace, 4
bind = SUPER, parenleft, workspace, 5
bind = SUPER, minus, workspace, 6
bind = SUPER, egrave, workspace, 7
bind = SUPER, underscore, workspace, 8
bind = SUPER, ccedilla, workspace, 9
bind = SUPER, agrave, workspace, 10

# Move windows to workspaces
bind = SUPER SHIFT, ampersand, movetoworkspacesilent, 1
bind = SUPER SHIFT, eacute, movetoworkspacesilent, 2
bind = SUPER SHIFT, quotedbl, movetoworkspacesilent, 3
bind = SUPER SHIFT, apostrophe, movetoworkspacesilent, 4
bind = SUPER SHIFT, parenleft, movetoworkspacesilent, 5
bind = SUPER SHIFT, minus, movetoworkspacesilent, 6
bind = SUPER SHIFT, egrave, movetoworkspacesilent, 7
bind = SUPER SHIFT, underscore, movetoworkspacesilent, 8
bind = SUPER SHIFT, ccedilla, movetoworkspacesilent, 9
bind = SUPER SHIFT, agrave, movetoworkspacesilent, 10

# Scratchpad workspace
bind = SUPER, p, togglespecialworkspace, scratchpad
bind = SUPER SHIFT, p, movetoworkspacesilent, special:scratchpad

# Only display the OSD on the currently focused monitor
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

# Volume control
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, $osdclient --output-volume $default_volume_increment
bindeld = ,XF86AudioLowerVolume, Volume down, exec, $osdclient --output-volume -$default_volume_increment
bindeld = ,XF86AudioMute, Mute, exec, $osdclient --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, $osdclient --input-volume mute-toggle

bindld = SUPER, XF86AudioMute, Switch audio output, exec, myarchy-audio switch

# Brightness control
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, $osdclient --brightness $default_brightness_increment
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, $osdclient --brightness -$default_brightness_increment

# Caps lock
bindeld = CAPS, Caps_Lock, Toggle caps lock, exec, $osdclient --caps-lock

# Media control
bindld = , XF86AudioNext, Next track, exec, $osdclient --playerctl next
bindld = , XF86AudioPause, Pause, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, $osdclient --playerctl previous

