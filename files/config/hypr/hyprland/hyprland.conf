monitor=,preferred,auto,1.0

exec-once = uwsm app -- waybar
exec-once = uwsm app -- hyprpaper
exec-once = hyprpm reload
exec-once = uwsm app -- hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = uwsm app -- udiskie
exec-once = uwsm app -- mako
exec-once = uwsm app -- swayosd-server
exec-once = myarchy-cursor set-default

general {
    allow_tearing = false

    layout = dwindle

    resize_on_border = true
    extend_border_grab_area = 30
    hover_icon_on_border = true

    no_focus_fallback = false

    snap {
        enabled = true
        window_gap = 10
        monitor_gap = 10
    }
}

dwindle {
    # pseudotile = true # TODO: seems to have no effect when opening window ?
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

misc {
    vrr = 1
    animate_manual_resizes = false
    animate_mouse_windowdragging = false

    disable_hyprland_logo = true
    force_default_wallpaper = 0

    new_window_takes_over_fullscreen = 2

    allow_session_lock_restore = true

    initial_workspace_tracking = false

    middle_click_paste = false

    # mouse_move_enables_dpms = true
    key_press_enables_dpms = true

    disable_autoreload = true # autoreload can sometimes cause some flickering issues
}

binds {
    # hide_special_on_workspace_change = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

input {
    kb_layout = fr

    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35

    follow_mouse = 2
    special_fallthrough = true
    float_switch_override_focus = 0
    # follow_mouse_threshold = 500.0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 1.2
        drag_lock = true
    }
}

plugin {
    hyprexpo {
        enable_gesture = true # laptop touchpad, 4 fingers
        gesture_distance = 300 # how far is the "max"
        gesture_positive = false 

        columns = 2
        gap_size = 0
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1
    }
}

bind = SUPER ALT CTRL SHIFT, escape, exec, uwsm stop
bind = SUPER ALT SHIFT, l, exec, uwsm app -- myarchy-session lock

bind = SUPER, space, exec, uwsm app -- rofi -show combi -display-combi "?" -modes combi -combi-modes "window,drun" -show-icons 
bind = SUPER SHIFT, space, exec, uwsm app -- myarchy-menu
bind = SUPER, q, exec, uwsm app -- alacritty
bind = SUPER SHIFT, e, exec, uwsm app -- rofi -modi emoji -show emoji -display-emoji "Emoji"
bind = SUPER SHIFT, s, exec, uwsm app -- myarchy-screenshot

bind = SUPER, c, killactive,
bind = SUPER, v, togglefloating,
bind = SUPER, o, pseudo
bind = SUPER, s, togglesplit,
bind = SUPER, f, fullscreen,
# bind = SUPER, g, togglegroup,

# Move focus
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

# Move window or group
bind = SUPER SHIFT, h, movewindoworgroup, l
bind = SUPER SHIFT, l, movewindoworgroup, r
bind = SUPER SHIFT, k, movewindoworgroup, u
bind = SUPER SHIFT, j, movewindoworgroup, d

# Move/resize windows
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind= SUPER,r,submap,resize 
submap=resize
binde=,l,resizeactive,100 0
binde=,h,resizeactive,-100 0
binde=,k,resizeactive,0 -100
binde=,j,resizeactive,0 100
bind =,catchall, submap, reset
submap=reset

# Cycle groups
bind = ALT, tab, changegroupactive, f
bind = ALT SHIFT, tab, changegroupactive, b

# Cycle windows
bindd = SUPER, tab, Cycle to next window, cyclenext
bindd = SUPER, tab, Reveal active window on top, bringactivetotop
bindd = SUPER SHIFT, tab, Cycle to previous window, cyclenext, prev
bindd = SUPER SHIFT, tab, Reveal active window on top, bringactivetotop

# Cycle workspaces
bindd = SUPER, mouse_down, Scroll active workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll active workspace backward, workspace, e-1

# Switch workspaces
bind = SUPER, ampersand, workspace, 1
bind = SUPER, eacute, workspace, 2
bind = SUPER, quotedbl, workspace, 3
bind = SUPER, apostrophe, workspace, 4
bind = SUPER, parenleft, workspace, 5
bind = SUPER, minus, workspace, 6
bind = SUPER, egrave, workspace, 7
bind = SUPER, underscore, workspace, 8
bind = SUPER, ccedilla, workspace, 9
bind = SUPER, agrave, workspace, 10

# Move windows to workspaces
bind = SUPER SHIFT, ampersand, movetoworkspacesilent, 1
bind = SUPER SHIFT, eacute, movetoworkspacesilent, 2
bind = SUPER SHIFT, quotedbl, movetoworkspacesilent, 3
bind = SUPER SHIFT, apostrophe, movetoworkspacesilent, 4
bind = SUPER SHIFT, parenleft, movetoworkspacesilent, 5
bind = SUPER SHIFT, minus, movetoworkspacesilent, 6
bind = SUPER SHIFT, egrave, movetoworkspacesilent, 7
bind = SUPER SHIFT, underscore, movetoworkspacesilent, 8
bind = SUPER SHIFT, ccedilla, movetoworkspacesilent, 9
bind = SUPER SHIFT, agrave, movetoworkspacesilent, 10

# Scratchpad workspace
bind = SUPER, p, togglespecialworkspace, scratchpad
bind = SUPER SHIFT, p, movetoworkspacesilent, special:scratchpad

# Only display the OSD on the currently focused monitor
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

# Volume control
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, $osdclient --output-volume $default_volume_increment
bindeld = ,XF86AudioLowerVolume, Volume down, exec, $osdclient --output-volume -$default_volume_increment
bindeld = ,XF86AudioMute, Mute, exec, $osdclient --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, $osdclient --input-volume mute-toggle

bindld = SUPER, XF86AudioMute, Switch audio output, exec, myarchy-audio switch

# Brightness control
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, $osdclient --brightness $default_brightness_increment
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, $osdclient --brightness -$default_brightness_increment

# Caps lock
bindeld = CAPS, Caps_Lock, Toggle caps lock, exec, $osdclient --caps-lock

# Media control
bindld = , XF86AudioNext, Next track, exec, $osdclient --playerctl next
bindld = , XF86AudioPause, Pause, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, $osdclient --playerctl previous

general {
    gaps_in = 10
    gaps_out = 20,20,20,20
    gaps_workspaces = 20
    border_size = 2
}

decoration {
    rounding = 0

    blur {
        new_optimizations = true
        enabled = true
        size = 8
        passes = 1
    }

    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }

    active_opacity = 0.93
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0
}

group {
    groupbar {
        render_titles = false
        keep_upper_gap = false
        indicator_height = 5
        rounding = 2
    }
}

animations {
    enabled = true
    # first_launch_animation = false FIXME:

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1 

    animation = windows, 1, 2, md3_decel, popin 60%
    animation = windowsIn, 1, 2, md3_decel, popin 60%
    animation = windowsOut, 1, 2, md3_accel, popin 60%
    animation = border, 1, 5, default
    animation = fade, 1, 2, md3_decel

    animation = layersIn, 1, 2, menu_decel, slide
    animation = layersOut, 1, 1, menu_accel
    animation = fadeLayersIn, 1, 1, menu_decel
    animation = fadeLayersOut, 1, 0.5, menu_accel
    animation = workspaces, 1, 3, menu_decel, slide

    animation = specialWorkspace, 1, 2, md3_decel, slidevert
}

blurls = waybar # TODO: what does it do ?
layerrule = blur, waybar
layerrule = blurpopups, waybar
layerrule = ignorealpha 0.8, waybar

layerrule = blur, rofi
layerrule = ignorealpha 0.2, rofi

source=./theme.conf

source=./apps/myarchy.conf
source=./apps/keepass.conf
source=./apps/common.conf
source=./apps/emulator.conf
